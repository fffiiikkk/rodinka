version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rodinkal
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: rodinkal
    ports:
      - '5434:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rodinkal']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:

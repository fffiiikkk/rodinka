name: Check App Logs

on:
  workflow_dispatch:
    inputs:
      lines:
        description: "Number of log lines to tail"
        default: "150"
        required: false

env:
  SSH_HOST: ssh.krataf.dev

jobs:
  logs:
    name: Tail production logs + diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-main.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] \
            https://pkg.cloudflare.com/cloudflared $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt-get update -q && sudo apt-get install -y cloudflared

      - name: Configure SSH via Cloudflare Access
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SYNOLOGY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host ${{ env.SSH_HOST }}
            User ${{ secrets.SYNOLOGY_SSH_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ServerAliveInterval 30
            ServerAliveCountMax 3
            ProxyCommand cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_ACCESS_CLIENT_ID }} --service-token-secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          EOF

      - name: App logs + upload dir diagnostics
        run: |
          ssh ${{ env.SSH_HOST }} 'export PATH=/usr/local/bin:$PATH
          echo "=== CONTAINER STATUS ==="
          docker ps --filter "name=rodinka_app" --format "{{.Names}} {{.Status}}"

          echo ""
          echo "=== UPLOAD DIR ==="
          docker exec rodinka_app ls -la /app/uploads/ 2>&1 || echo "FAILED"

          echo ""
          echo "=== UPLOAD DIR WRITE TEST ==="
          docker exec rodinka_app sh -c "echo test > /app/uploads/test_write.txt && rm /app/uploads/test_write.txt && echo WRITABLE" 2>&1 || echo "NOT WRITABLE"

          echo ""
          echo "=== LAST ${{ inputs.lines }} LOG LINES ==="
          docker logs rodinka_app --tail ${{ inputs.lines }} 2>&1'

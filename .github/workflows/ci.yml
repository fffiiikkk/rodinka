name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Generate Prisma client
        run: cd packages/backend && npx prisma generate

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Type-check backend
        run: npm run typecheck --workspace=packages/backend

      - name: Type-check frontend
        run: npm run typecheck --workspace=packages/frontend

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=packages/shared

      - name: Run unit tests
        run: npm run test:unit --workspaces --if-present

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: packages/*/coverage/
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rodinkal
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: rodinkal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://rodinkal:testpass@localhost:5432/rodinkal_test?schema=public
      SESSION_SECRET: test-session-secret-minimum-32-chars-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=packages/shared

      - name: Generate Prisma client
        run: cd packages/backend && npx prisma generate

      - name: Run migrations
        run: cd packages/backend && npx prisma migrate deploy

      - name: Run integration tests
        run: npm run test:integration --workspace=packages/backend

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: integration-test-results
          path: packages/backend/test-results/
          retention-days: 7

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests]
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      short_sha: ${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rodinkal
          tags: |
            type=raw,value=1.0.${{ github.run_number }}+${{ steps.sha.outputs.short }}
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=1.0.${{ github.run_number }}+${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests]
    if: github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rodinkal
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: rodinkal_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://rodinkal:testpass@localhost:5432/rodinkal_e2e?schema=public
      SESSION_SECRET: e2e-session-secret-minimum-32-chars
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=packages/shared

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build & seed
        run: |
          npm run build --workspace=packages/shared
          cd packages/backend && npx prisma generate && cd ../..
          npm run build --workspace=packages/backend
          npm run build --workspace=packages/frontend
          cd packages/backend
          npx prisma migrate deploy
          npx tsx prisma/seed/index.ts

      - name: Start app
        run: |
          cd packages/backend
          node dist/index.js &
          echo $! > /tmp/app.pid
          # Wait for app to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/health && echo "App ready" && break
            sleep 2
          done
        env:
          DATABASE_URL: postgresql://rodinkal:testpass@localhost:5432/rodinkal_e2e?schema=public
          SESSION_SECRET: e2e-session-secret-minimum-32-chars
          NODE_ENV: test
          PORT: "3000"
          APP_URL: http://localhost:3000

      - name: Run E2E tests
        run: npx playwright test

      - name: Stop app
        if: always()
        run: kill $(cat /tmp/app.pid) || true

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

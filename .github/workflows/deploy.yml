name: Deploy → Synology

# Runs automatically after CI succeeds on main.
# Manual trigger always proceeds (skips CI gate).
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   CF_ACCESS_CLIENT_ID      — Cloudflare Access Service Token ID
#   CF_ACCESS_CLIENT_SECRET  — Cloudflare Access Service Token Secret
#   SYNOLOGY_SSH_KEY         — SSH private key for Synology access
#   SYNOLOGY_SSH_USER        — SSH user on Synology (e.g. krataf)
#
# NOTE: This workflow does NOT rebuild the Docker image.
# The CI workflow (ci.yml) already builds and pushes ghcr.io/.../rodinkal:latest.
# This workflow pulls that pre-built image onto the NAS and restarts the app.

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-synology
  cancel-in-progress: false

env:
  IMAGE:      ghcr.io/${{ github.repository_owner }}/rodinkal
  SSH_HOST:   ssh.krataf.dev
  DEPLOY_DIR: /volume1/docker/rodinka

jobs:
  deploy:
    name: Deploy to Synology (Cloudflare SSH)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: read   # read is enough — we only pull, CI already pushed

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      # ── SSH setup via Cloudflare Access ────────────────────────────────────
      - name: Install cloudflared
        run: |
          curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-main.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] \
            https://pkg.cloudflare.com/cloudflared $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt-get update -q && sudo apt-get install -y cloudflared

      - name: Configure SSH via Cloudflare Access
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SYNOLOGY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host ${{ env.SSH_HOST }}
            User ${{ secrets.SYNOLOGY_SSH_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ServerAliveInterval 30
            ServerAliveCountMax 3
            ProxyCommand cloudflared access ssh --hostname %h --service-token-id ${{ secrets.CF_ACCESS_CLIENT_ID }} --service-token-secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          EOF

      # ── Connectivity test — fail fast with diagnostic if tunnel is broken ─
      - name: Test SSH connectivity
        run: |
          ssh ${{ env.SSH_HOST }} "echo 'SSH OK — hostname: $(hostname)'" || {
            echo ""
            echo "══════════════════════════════════════════════════════════"
            echo "  SSH CONNECTION FAILED — check Cloudflare Zero Trust:"
            echo ""
            echo "  1. Zero Trust → Networks → Tunnels → your tunnel → Edit"
            echo "     Ingress rules must include:"
            echo "       hostname: ssh.krataf.dev"
            echo "       service:  ssh://localhost:22"
            echo ""
            echo "  2. Zero Trust → Access → Applications"
            echo "     App 'ssh.krataf.dev' must exist with policy:"
            echo "       Action: Allow"
            echo "       Include: Service Token = CF_ACCESS_CLIENT_ID secret"
            echo "══════════════════════════════════════════════════════════"
            exit 1
          }

      # ── Upload latest compose file ─────────────────────────────────────────
      - name: Upload docker-compose.prod.yml
        run: |
          ssh ${{ env.SSH_HOST }} "mkdir -p ${{ env.DEPLOY_DIR }}"
          cat docker-compose.prod.yml | \
            ssh ${{ env.SSH_HOST }} "cat > ${{ env.DEPLOY_DIR }}/docker-compose.prod.yml"

      # ── Pull pre-built image, migrate DB, restart app ─────────────────────
      # Using single-quoted SSHEOF so bash doesn't expand $vars on the runner.
      # GitHub Actions ${{ }} expressions are substituted before bash runs,
      # so they work as literal values inside the single-quoted heredoc.
      - name: Deploy
        run: |
          ssh ${{ env.SSH_HOST }} << 'SSHEOF'
          set -e
          cd ${{ env.DEPLOY_DIR }}

          # Preflight — .env.prod must exist (created during initial setup)
          if [ ! -f .env.prod ]; then
            echo "ERROR: .env.prod not found on NAS. Run synology/setup.sh first." >&2
            exit 1
          fi

          # Log in to GHCR using the CI workflow's token (read-only pull)
          for attempt in 1 2 3; do
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin && break
            echo "docker login attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

          # Pull the image already built and pushed by the CI workflow (retry on network glitch)
          for attempt in 1 2 3; do
            docker pull ${{ env.IMAGE }}:latest && break
            echo "docker pull attempt $attempt failed, retrying in 15s..."
            sleep 15
          done

          # Ensure DB is running (idempotent)
          docker compose -f docker-compose.prod.yml --env-file .env.prod up -d postgres
          sleep 8

          # Run any pending migrations in a disposable container
          # (set -e is active, so failure here aborts the script)
          docker compose -f docker-compose.prod.yml --env-file .env.prod \
            run --rm --no-deps app \
            sh -c "cd packages/backend && npx prisma migrate deploy"

          # Restart the app container with the new image
          docker compose -f docker-compose.prod.yml --env-file .env.prod \
            up -d --no-deps --force-recreate app

          # Give the container 5 s to settle, then verify it is actually running
          sleep 5
          if docker ps --filter "name=rodinka_app" --format "{{.Names}}" | grep -q rodinka_app; then
            echo "✓ Container rodinka_app is running"
          else
            echo "✗ Container rodinka_app is NOT running — last 40 log lines:"
            docker logs --tail 40 rodinka_app 2>&1 || true
            echo "--- docker ps -a ---"
            docker ps -a --filter "name=rodinka" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" || true
            exit 1
          fi

          docker image prune -f
          echo "Deploy complete on $(hostname) at $(date)"
          SSHEOF

      # ── Container status snapshot before health polling ───────────────────
      - name: Verify container state
        run: |
          echo "Container state 10 s after deploy step:"
          sleep 10
          ssh ${{ env.SSH_HOST }} \
            "export PATH=/usr/local/bin:\$PATH; docker ps -a --filter name=rodinka --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'; echo '--- logs (last 20) ---'; docker logs --tail 20 rodinka_app 2>&1 || echo '(container not found)'" || true

      # ── Health check — poll until app responds or timeout after 120 s ─────
      - name: Health check
        run: |
          echo "Polling health endpoint (up to 120 s)..."
          for i in $(seq 1 24); do
            result=$(ssh ${{ env.SSH_HOST }} \
              "curl -sf http://localhost:3010/health 2>/dev/null" || true)
            if [ -n "$result" ]; then
              echo "✓ Deploy OK: $result"
              exit 0
            fi
            echo "  Attempt $i/24 — not ready yet, waiting 5 s..."
            sleep 5
          done
          echo "✗ Health check failed after 120 s — diagnostics:"
          ssh ${{ env.SSH_HOST }} "export PATH=/usr/local/bin:\$PATH; \
            echo '--- docker ps -a ---'; \
            docker ps -a --filter name=rodinka --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'; \
            echo '--- rodinka_app logs ---'; \
            docker logs --tail 60 rodinka_app 2>&1 || echo '(no container)'; \
            echo '--- rodinka_db logs ---'; \
            docker logs --tail 20 rodinka_db 2>&1 || echo '(no db container)'" || true
          exit 1

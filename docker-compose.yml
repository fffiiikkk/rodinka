version: '3.9'

# ── Rodinka — Generic / local reference compose ──────────────────────────────
# For local development use docker-compose.dev.yml.
# For production on Synology use docker-compose.prod.yml.
#
# IMPORTANT: Do NOT add a 'cloudflared' service here.
# The Cloudflare tunnel is managed centrally on the NAS as a separate
# standalone container (or Synology package). Adding it here risks
# overwriting the shared tunnel configuration that is used by all
# applications (rodinka, training-diary, avatar, etc.).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rodinkal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rodinkal}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-rodinkal}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    image: ${GHCR_IMAGE:-rodinkal/app}:${APP_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-rodinkal}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rodinkal}?schema=public
      SESSION_SECRET: ${SESSION_SECRET}
      APP_URL: ${APP_URL}
      APP_VERSION: ${APP_VERSION:-latest}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      UPLOAD_DIR: /app/uploads
      UPLOAD_MAX_SIZE_MB: ${UPLOAD_MAX_SIZE_MB:-20}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - uploads:/app/uploads
    ports:
      - '${APP_PORT:-3000}:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

volumes:
  pgdata:
  uploads:

networks:
  internal:
    driver: bridge

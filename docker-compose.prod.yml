version: '3.9'

# ── Rodinka — Production on Synology NAS ────────────────────────────────────
# Public URL:  https://calendar.krataf.dev  (via Cloudflare tunnel)
# Internal:    http://localhost:3010
#
# Managed by GitHub Actions deploy workflow (SSH + cloudflared).
# Initial setup / manual:
#   cd /volume1/docker/rodinka
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# ⚠️  DO NOT add a 'cloudflared' service to this file.
#     The Cloudflare tunnel is managed as a single shared container on the NAS
#     (separate from any application). If you start a second cloudflared here,
#     it will overwrite the shared tunnel ingress rules and break ssh.krataf.dev
#     (used by training-diary, rodinka, and other apps for CI/CD deployments).
#     See synology/README-synology.md → "Cloudflare tunnel management".

services:
  app:
    image: ghcr.io/fffiiikkk/rodinkal:latest
    container_name: rodinka_app
    restart: unless-stopped
    ports:
      - "3010:3000"
    environment:
      DATABASE_URL: "postgresql://rodinkal:${DB_PASSWORD}@postgres:5432/rodinkal?schema=public"
      SESSION_SECRET: "${SESSION_SECRET}"
      NODE_ENV: production
      PORT: "3000"
      APP_URL: "https://calendar.krataf.dev"
      RESEND_API_KEY: "${RESEND_API_KEY}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY}"
      VAPID_SUBJECT: "${VAPID_SUBJECT}"
      # S3 / local uploads — leave blank to use local filesystem
      S3_BUCKET: "${S3_BUCKET:-}"
      AWS_REGION: "${AWS_REGION:-eu-central-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
    volumes:
      - rodinka_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rodinka_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    container_name: rodinka_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rodinkal
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: rodinkal
    volumes:
      - rodinka_pgdata:/var/lib/postgresql/data
    networks:
      - rodinka_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rodinkal"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rodinka_pgdata:
    name: rodinka_pgdata
  rodinka_uploads:
    name: rodinka_uploads

networks:
  rodinka_net:
    name: rodinka_net
    driver: bridge

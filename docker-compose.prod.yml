version: '3.9'

# ── Rodinka — Production on Synology NAS ────────────────────────────────────
# Public URL:  https://calendar.krataf.dev  (via Cloudflare tunnel)
# Internal:    http://localhost:3001
#
# Usage:
#   cp .env.prod.example .env.prod
#   nano .env.prod          # fill in secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  app:
    image: ghcr.io/fffiiikkk/rodinkal:latest
    container_name: rodinka_app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: "postgresql://rodinkal:${DB_PASSWORD}@postgres:5432/rodinkal?schema=public"
      SESSION_SECRET: "${SESSION_SECRET}"
      NODE_ENV: production
      PORT: "3000"
      APP_URL: "https://calendar.krataf.dev"
      RESEND_API_KEY: "${RESEND_API_KEY}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY}"
      VAPID_SUBJECT: "${VAPID_SUBJECT}"
      # S3 / local uploads — leave blank to use local filesystem
      S3_BUCKET: "${S3_BUCKET:-}"
      AWS_REGION: "${AWS_REGION:-eu-central-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
    volumes:
      - rodinka_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rodinka_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    container_name: rodinka_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rodinkal
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: rodinkal
    volumes:
      - rodinka_pgdata:/var/lib/postgresql/data
    networks:
      - rodinka_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rodinkal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Webhook receiver — listens for GitHub Actions deploy triggers
  webhook:
    image: node:20-alpine
    container_name: rodinka_webhook
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      WEBHOOK_SECRET: "${DEPLOY_WEBHOOK_SECRET}"
      COMPOSE_FILE: /app/docker-compose.prod.yml
      ENV_FILE: /app/.env.prod
      GHCR_IMAGE: "ghcr.io/fffiiikkk/rodinkal"
    volumes:
      - ./synology/webhook-server.mjs:/app/webhook-server.mjs:ro
      - ./docker-compose.prod.yml:/app/docker-compose.prod.yml:ro
      - ./.env.prod:/app/.env.prod:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["node", "/app/webhook-server.mjs"]
    networks:
      - rodinka_net

volumes:
  rodinka_pgdata:
    name: rodinka_pgdata
  rodinka_uploads:
    name: rodinka_uploads

networks:
  rodinka_net:
    name: rodinka_net
    driver: bridge
